name: Deploy — Xedu_managment

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: self-hosted
    timeout-minutes: 45

    steps:

      # ── 1. Eng yangi kodni yuklab olish ─────────────────────────────────────
      - name: Pull latest code
        run: |
          set -e
          cd /opt/eduplatform
          git fetch origin main
          git reset --hard origin/main
          echo "HEAD: $(git log --oneline -1)"

      # ── 2. Pre-build: disk tekshiruv va kesh tozalash ───────────────────────
      - name: Pre-build diagnostics & cleanup
        run: |
          echo "=== DISK BEFORE ==="
          df -h /
          echo "=== DOCKER DISK ==="
          docker system df
          echo "=== CLEANING BUILD CACHE ==="
          docker image prune -f || true
          docker builder prune --keep-storage=5gb -f || true
          echo "=== DISK AFTER ==="
          df -h / | tail -1
          echo "=== COMPOSE CONFIG VALIDATE ==="
          cd /opt/eduplatform
          docker compose -f docker-compose.selfhost.yml config --quiet \
            && echo "Config OK" \
            || { echo "Config ERROR — aborting"; exit 1; }

      # ── 3. Rolling recreate (zero-downtime) ────────────────────────────────
      # OLD: down --remove-orphans → up --build (guaranteed downtime)
      # NEW: build first, then up -d (only changed containers restart)
      - name: Build and rolling-recreate services
        run: |
          set -e
          cd /opt/eduplatform
          echo "Building images without stopping running containers..."
          docker compose -f docker-compose.selfhost.yml build
          echo "Recreating only changed services (DB/Redis stay up)..."
          docker compose -f docker-compose.selfhost.yml up -d --remove-orphans
          echo "Services recreated. Downtime reduced to container restart time only."

      # ── 4. Sog'liqni tekshirish — backend to'g'ridan tekshirish ───────────────
      - name: Wait for healthy (up to 5 min)
        run: |
          cd /opt/eduplatform
          echo "Waiting for backend health..."
          for i in $(seq 1 60); do
            STATUS=$(docker compose -f docker-compose.selfhost.yml exec -T backend \
              wget -qO- http://localhost:3001/api/health 2>/dev/null && echo "200" || echo "000")
            if [ "$STATUS" = "200" ] || echo "$STATUS" | grep -qE "\"status\""; then
              echo "Backend healthy after $((i * 5))s"
              exit 0
            fi
            if [ "$i" -eq 60 ]; then
              echo "ERROR: backend not healthy after 5 min"
              exit 1
            fi
            printf "  [%02d/60] not ready — %ds\n" "$i" "$((i * 5))"
            sleep 5
          done

      # ── 5. workload.cybertron.uz — PM2 tekshiruvi ──────────────────────────
      - name: Check workload PM2
        run: |
          WPORT=${WORKLOAD_PORT:-3002}
          STATUS=$(curl -sf -o /dev/null -w "%{http_code}" \
            http://localhost:${WPORT}/ 2>/dev/null || echo "000")
          if [ "$STATUS" != "000" ]; then
            echo "workload PM2 port ${WPORT}: HTTP $STATUS — OK"
          else
            echo "WARN: workload PM2 port ${WPORT} not responding"
            pm2 list 2>/dev/null || true
          fi

      # ── 6. Holat va loglar (har doim ko'rsatiladi) ─────────────────────────
      - name: Status & logs
        if: always()
        run: |
          cd /opt/eduplatform
          echo "=== GIT ==="
          git log --oneline -3
          echo ""
          echo "=== PORTS ==="
          ss -tlnp | grep -E ':80|:443|:3002' | awk '{print $4, $6}' || true
          echo ""
          echo "=== CONTAINERS ==="
          docker compose -f docker-compose.selfhost.yml ps \
            --format "table {{.Name}}\t{{.Status}}\t{{.Ports}}"
          echo ""
          echo "=== MIGRATE LOGS ==="
          docker compose -f docker-compose.selfhost.yml logs --tail=60 migrate 2>/dev/null || true
          echo ""
          echo "=== BACKEND (last 40) ==="
          docker compose -f docker-compose.selfhost.yml logs --tail=40 backend 2>/dev/null || true
          echo ""
          echo "=== PROXY (host nginx status) ==="
          systemctl is-active nginx 2>/dev/null || true
          echo ""
          echo "=== FRONTEND (last 10) ==="
          docker compose -f docker-compose.selfhost.yml logs --tail=10 frontend 2>/dev/null || true
          echo ""
          echo "=== DISK ==="
          df -h / | tail -1
          docker system df
