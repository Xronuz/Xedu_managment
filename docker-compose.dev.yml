# ─── EduPlatform Development Stack (PostgreSQL + Redis) ───────────────────────

services:
  postgres:
    image: postgres:16-alpine
    container_name: eduplatform-dev-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: eduplatform
      POSTGRES_PASSWORD: eduplatform_password
      POSTGRES_DB: eduplatform_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_dev_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U eduplatform -d eduplatform_db"]
      interval: 3s
      timeout: 3s
      retries: 20
      start_period: 5s

  redis:
    image: redis:7-alpine
    container_name: eduplatform-dev-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_dev_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 3s
      timeout: 3s
      retries: 10

volumes:
  postgres_dev_data:
  redis_dev_data:
